<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>
</head>

<body>

<h2>Expense Tracker</h2>

<label>Expense Name:</label>
<input type="text" id="name"><br><br>

<label>Amount:</label>
<input type="number" id="amount"><br><br>

<label>Category:</label>
<select id="category">
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
</select><br><br>

<button onclick="addExpense()">Add Expense</button>
<button onclick="updateExpense()">Update Expense</button>

<h3>Total: <span id="total">0</span></h3>

<table border="1">
<tr>
<th>Name</th>
<th>Amount</th>
<th>Category</th>
<th>Action</th>
</tr>
<tbody id="expenseList"></tbody>
</table>

<script>

let expenses = []
let editIndex = -1

function addExpense(){

let name = document.getElementById("name").value
let amount = document.getElementById("amount").value
let category = document.getElementById("category").value

if(name=="" || amount==""){
alert("Enter all fields")
return
}

let expense = {
name:name,
amount:Number(amount),
category:category
}

expenses.push(expense)

displayExpenses()
calculateTotal()
clearFields()
}

function displayExpenses(){

let list = document.getElementById("expenseList")
list.innerHTML=""

expenses.forEach((e,index)=>{

list.innerHTML += `
<tr>
<td>${e.name}</td>
<td>${e.amount}</td>
<td>${e.category}</td>
<td>
<button onclick="editExpense(${index})">Edit</button>
<button onclick="deleteExpense(${index})">Delete</button>
</td>
</tr>
`
})
}

function deleteExpense(index){

expenses.splice(index,1)

displayExpenses()
calculateTotal()
}

function editExpense(index){

let e = expenses[index]

document.getElementById("name").value = e.name
document.getElementById("amount").value = e.amount
document.getElementById("category").value = e.category

editIndex = index
}

function updateExpense(){

if(editIndex==-1){
alert("Select expense to update")
return
}

expenses[editIndex].name = document.getElementById("name").value
expenses[editIndex].amount = Number(document.getElementById("amount").value)
expenses[editIndex].category = document.getElementById("category").value

displayExpenses()
calculateTotal()
clearFields()

editIndex = -1
}

function calculateTotal(){

let total = 0

expenses.forEach(e=>{
total += e.amount
})

document.getElementById("total").innerText = total
}

function clearFields(){

document.getElementById("name").value=""
document.getElementById("amount").value=""
}

</script>

</body>
</html>
